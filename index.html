    /* ---------------- Scoring Algorithm ---------------- */
    /*
     * scorePhone(phone, priorities, currentPhone)
     *   priorities = { camera, battery, performance, display } each 0-100.
     *   Returns { raw, adjusted, penalty, contributions }.
     *
     * raw score        = weighted average of the four normalized spec scores
     * ecosystem penalty:
     *     0  if same ecosystem (e.g. Samsung -> Samsung)
     *     5  if same family, different brand (Samsung -> Pixel)
     *    15  if crossing iOS <-> Android (bigger friction: iMessage/AirDrop/DeX loss)
     * adjusted score   = raw - penalty
     * contributions[i] = weight_i * spec_i / totalWeight (used to explain "why this phone")
     */
    function scorePhone(phone, priorities, currentPhone) {
      const keys = ['camera', 'battery', 'performance', 'display'];
      const totalWeight = keys.reduce((s, k) => s + priorities[k], 0);
      if (totalWeight === 0) return { raw: 0, adjusted: 0, penalty: 0, contributions: {} };

      let raw = 0;
      const contributions = {};
      keys.forEach((k) => {
        const c = (priorities[k] * phone.specs[k]) / totalWeight;
        contributions[k] = c;
        raw += c;
      });

      let penalty = 0;
      if (currentPhone && currentPhone.id !== phone.id) {
        if (currentPhone.ecosystem === phone.ecosystem) penalty = 0;
        else if (currentPhone.ecosystemFamily === phone.ecosystemFamily) penalty = 5;
        else penalty = 15;
      }

      return {
        raw: Math.round(raw * 10) / 10,
        adjusted: Math.round((raw - penalty) * 10) / 10,
        penalty,
        contributions,
      };
    }

    function ecosystemDelta(currentPhone, candidate) {
      // What does the user lose / gain if they switch?
      if (!currentPhone || currentPhone.id === candidate.id) return { lost: [], gained: [] };
      const cur = new Set(currentPhone.ecosystemFeatures);
      const cand = new Set(candidate.ecosystemFeatures);
      const lost = [...cur].filter((f) => !cand.has(f));
      const gained = [...cand].filter((f) => !cur.has(f));
      return { lost, gained };
    }

    function topPrioritiesForPhone(phone, priorities, contributions) {
      // Rank the four dimensions by contribution and take the top two.
      return Object.entries(contributions)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 2)
        .map(([k]) => k);
    }

    function verdictFor(currentScore, topScore) {
      const diff = topScore - currentScore;
      if (diff >= 8) return { label: 'Worth upgrading', tone: 'good',
        text: `Top recommendation scores +${diff.toFixed(1)} vs your current phone — a meaningful jump on your priorities.` };
      if (diff >= 3) return { label: 'Marginal upgrade', tone: 'meh',
        text: `Only +${diff.toFixed(1)} over your current phone. Worth it if you\'ll keep it 3+ years, otherwise wait.` };
      return { label: 'Wait a generation', tone: 'bad',
        text: `Your current phone still scores within ${Math.abs(diff).toFixed(1)} of the top pick for your priorities. Save the money.` };
    }

            <Card className="p-8 text-center">
              <div className="text-slate-400 mb-4">You have {picked.length} phone{picked.length === 1 ? '' : 's'} selected. Add {2 - picked.length} more to start comparing.</div>
              <button onClick={onGoBrowse}
                className="inline-flex items-center gap-2 bg-accent hover:bg-accent-soft text-ink-950 font-semibold rounded-lg px-4 py-2 transition">
                Browse phones <ArrowRight className="w-4 h-4" />
              </button>
            </Card>
          </div>
        );
      }

      const specRows = [
        { key: 'sentimentScore', label: 'Sentiment', get: (p) => `${p.sentimentScore}%`, cmp: (a,b) => a.sentimentScore - b.sentimentScore, icon: Star },
        { key: 'price', label: 'Price', get: (p) => `S$${p.price}`, cmp: (a,b) => b.price - a.price, icon: DollarSign }, // lower price wins
        { key: 'year', label: 'Released', get: (p) => p.year, cmp: (a,b) => a.year - b.year },
        { key: 'chipset', label: 'Chipset', get: (p) => p.displayInfo.chipset, cmp: (a,b) => a.specs.performance - b.specs.performance, icon: Cpu },
        { key: 'display', label: 'Display', get: (p) => `${p.displayInfo.display} · ${p.displayInfo.refreshRate}`, cmp: (a,b) => a.specs.display - b.specs.display, icon: Monitor },
        { key: 'camera', label: 'Camera', get: (p) => p.displayInfo.cameraMP, cmp: (a,b) => a.specs.camera - b.specs.camera, icon: Camera },
        { key: 'battery', label: 'Battery', get: (p) => p.displayInfo.batteryMah, cmp: (a,b) => a.specs.battery - b.specs.battery, icon: Battery },
        { key: 'ram', label: 'RAM / Storage', get: (p) => `${p.displayInfo.ram} · ${p.displayInfo.storage}` },
        { key: 'ecosystem', label: 'Ecosystem', get: (p) => p.ecosystem, icon: Package },
      ];

      return (
        <div className="animate-fade-in">
          <SectionTitle eyebrow="Compare" icon={Layers}
            title="Side-by-side comparison"
            subtitle="Green rows highlight the winner on each dimension." />

          {/* Phone chips row */}
          <div className={cx('grid gap-3 mb-6', picked.length === 2 ? 'md:grid-cols-2' : 'md:grid-cols-3')}>
            {picked.map(p => (
              <Card key={p.id} className="p-4 relative">
                <button onClick={() => setShortlist(shortlist.filter(id => id !== p.id))}
                        className="absolute top-3 right-3 text-slate-500 hover:text-rose-400" title="Remove">
                  <X className="w-4 h-4" />
                </button>
                <div className="flex items-center gap-3">
                  <div className="w-10 h-14 rounded-lg flex items-center justify-center shrink-0"
                       style={{ background: `${p.accent}22`, border: `1px solid ${p.accent}66` }}>
                    <Smartphone className="w-5 h-5" style={{ color: p.accent }} />
                  </div>
                  <div>
                    <div className="text-xs text-slate-400">{p.brand}</div>
                    <div className="text-slate-100 font-semibold">{p.model}</div>
                    <div className="text-xs text-slate-400">S${p.price} · {p.year}</div>
                  </div>
                </div>
                <div className="mt-3 space-y-1.5">
                  <StatBar label="Camera" value={p.specs.camera} color={p.accent} sub={p.specs.camera} />
                  <StatBar label="Battery" value={p.specs.battery} color={p.accent} sub={p.specs.battery} />
                  <StatBar label="Performance" value={p.specs.performance} color={p.accent} sub={p.specs.performance} />
                  <StatBar label="Display" value={p.specs.display} color={p.accent} sub={p.specs.display} />
                </div>
              </Card>
            ))}
            {canAddMore && (
              <Card className="p-4 border-2 border-dashed border-ink-700 flex items-center justify-center text-slate-500 hover:text-accent-soft hover:border-accent/50 cursor-pointer"
                    onClick={onGoBrowse}>
                <div className="text-center">
                  <Plus className="w-6 h-6 mx-auto mb-1" />
                  <div className="text-sm">Add another phone</div>
                </div>
              </Card>
            )}
          </div>

          {/* Spec matrix */}
          <Card className="overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead className="bg-ink-800/60 text-slate-400 text-xs uppercase tracking-wider">
                  <tr>
                    <th className="text-left px-4 py-3 font-medium">Spec</th>
                    {picked.map(p => (
                      <th key={p.id} className="text-left px-4 py-3 font-medium text-slate-200">{p.brand} {p.model}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {specRows.map((row, i) => {
                    let winnerId = null;
                    if (row.cmp) {
                      const sorted = [...picked].sort(row.cmp);
                      winnerId = sorted[sorted.length - 1].id;
                    }
                    const I = row.icon;
                    return (
                      <tr key={row.key} className={cx(i % 2 === 0 ? 'bg-ink-850' : 'bg-ink-900/60')}>
                        <td className="px-4 py-3 text-slate-400 whitespace-nowrap">
                          <span className="inline-flex items-center gap-2">
                            {I && <I className="w-4 h-4 text-slate-500" />}
                            {row.label}
                          </span>
                        </td>
                        {picked.map(p => (
                          <td key={p.id}
                              className={cx('px-4 py-3', winnerId === p.id && 'text-emerald-300 font-medium')}>
                            <span className="inline-flex items-center gap-2">
                              {row.get(p)}
                              {winnerId === p.id && <Award className="w-3.5 h-3.5" />}
                            </span>
                          </td>
                        ))}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </Card>

          {/* Pros/cons columns */}
          <div className={cx('grid gap-3 mt-6', picked.length === 2 ? 'md:grid-cols-2' : 'md:grid-cols-3')}>
            {picked.map(p => (
              <Card key={p.id} className="p-4">
                <div className="text-slate-200 font-semibold mb-3">{p.brand} {p.model}</div>
                <div className="mb-3">
                  <div className="text-xs uppercase tracking-wider text-emerald-400/80 mb-2 flex items-center gap-1"><Check className="w-3 h-3" /> Pros</div>
                  <ul className="space-y-1.5">
                    {p.pros.map((s, i) => <li key={i} className="text-sm text-slate-300 flex gap-2"><span className="text-emerald-400 mt-0.5">+</span>{s}</li>)}
                  </ul>
                </div>
                <div>
                  <div className="text-xs uppercase tracking-wider text-rose-400/80 mb-2 flex items-center gap-1"><X className="w-3 h-3" /> Cons</div>
                  <ul className="space-y-1.5">
                    {p.cons.map((s, i) => <li key={i} className="text-sm text-slate-300 flex gap-2"><span className="text-rose-400 mt-0.5">−</span>{s}</li>)}
                  </ul>
                </div>
              </Card>
            ))}
          </div>
        </div>
      );
    };

    /* ---------------- Advisor view ---------------- */
    const PRIORITY_LABELS = { camera: 'Camera', battery: 'Battery life', performance: 'Performance', display: 'Display' };
    const PRIORITY_ICONS = { camera: Camera, battery: Battery, performance: Cpu, display: Monitor };
    const DEFAULT_PRIORITIES = { camera: 70, battery: 70, performance: 50, display: 50 };

    const AdvisorView = () => {
      const [currentId, setCurrentId] = useState('galaxy-s24');
      const [budget, setBudget] = useState(1400);
      const [priorities, setPriorities] = useState(DEFAULT_PRIORITIES);
      const [submitted, setSubmitted] = useState(false);

      const currentPhone = PHONES.find(p => p.id === currentId);

      const results = useMemo(() => {
        const currentScore = scorePhone(currentPhone, priorities, null);
        // Score every phone within budget (or slightly above), exclude the current phone from ranking
        const candidates = PHONES
          .filter(p => p.id !== currentId && p.price <= budget)
          .map(p => {
            const s = scorePhone(p, priorities, currentPhone);
            const eco = ecosystemDelta(currentPhone, p);
            const topPri = topPrioritiesForPhone(p, priorities, s.contributions);
            return { phone: p, score: s, eco, topPri };
          })
          .sort((a, b) => b.score.adjusted - a.score.adjusted)
          .slice(0, 3);

        const verdict = candidates.length
          ? verdictFor(currentScore.raw, candidates[0].score.adjusted)
          : { label: 'No matches', tone: 'meh', text: 'No phones fit your budget. Raise the budget or adjust priorities.' };

        return { currentScore: currentScore.raw, candidates, verdict };
      }, [currentId, budget, priorities, currentPhone]);

      const resetForm = () => {
        setPriorities(DEFAULT_PRIORITIES);
        setBudget(1400);
        setCurrentId('galaxy-s24');
        setSubmitted(false);
      };

      return (
        <div className="animate-fade-in">
          <SectionTitle eyebrow="Switching advisor" icon={Sparkles}
            title="Should you upgrade — or switch brands?"
            subtitle="Tell us what you carry today, what you care about, and what you can spend. We'll weigh spec scores against your priorities, apply an ecosystem-friction penalty for cross-brand switches, and tell you if the upgrade is actually worth it." />

          <div className="grid grid-cols-1 lg:grid-cols-[420px_1fr] gap-6">
            {/* Form */}
            <Card className="p-5 h-fit lg:sticky lg:top-4">
              <div className="text-sm uppercase tracking-wider text-slate-400 mb-4 flex items-center gap-2">
                <Info className="w-4 h-4" /> Your setup
              </div>

              <div className="mb-5">
                <label className="text-xs text-slate-400 block mb-1.5">Current phone</label>
                <div className="relative">
                  <select value={currentId} onChange={e=>setCurrentId(e.target.value)}
                          className="w-full bg-ink-900 ring-1 ring-ink-700 focus:ring-accent focus:outline-none rounded-lg pl-3 pr-8 py-2 text-sm text-slate-100 appearance-none">
                    {PHONES.map(p => <option key={p.id} value={p.id}>{p.brand} {p.model} ({p.year})</option>)}
                  </select>
                  <ChevronDown className="w-4 h-4 text-slate-500 absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none" />
                </div>
                {currentPhone && (
                  <div className="mt-2 text-xs text-slate-500">
                    Ecosystem: <span className="text-slate-300">{currentPhone.ecosystem}</span> · Score for your priorities: <span className="text-slate-300">{results.currentScore.toFixed(1)}</span>
                  </div>
                )}
              </div>

              <div className="mb-5">
                <label className="text-xs text-slate-400 flex items-center justify-between mb-1.5">
                  <span>Budget</span><span className="text-slate-200 font-medium">S${budget}</span>
                </label>
                <input type="range" min="300" max="2000" step="50" value={budget}
                       onChange={e=>setBudget(parseInt(e.target.value))} className="w-full" />
                <div className="flex justify-between text-[10px] text-slate-500 mt-1"><span>S$300</span><span>S$2,000</span></div>
              </div>

              <div className="mb-5">
                <div className="text-xs text-slate-400 mb-2">Priorities</div>
                <div className="space-y-3">
                  {Object.entries(PRIORITY_LABELS).map(([k, label]) => {
                    const I = PRIORITY_ICONS[k];
                    return (
                      <div key={k}>
                        <div className="flex items-center justify-between text-xs mb-1">
                          <span className="inline-flex items-center gap-1.5 text-slate-300"><I className="w-3.5 h-3.5 text-slate-400" /> {label}</span>
                          <span className="text-slate-200 font-medium">{priorities[k]}</span>
                        </div>
                        <input type="range" min="0" max="100" step="5" value={priorities[k]}
                               onChange={e=>setPriorities({...priorities, [k]: parseInt(e.target.value)})} className="w-full" />
                      </div>
                    );
                  })}
                </div>
              </div>

              <div className="flex gap-2">
                <button onClick={() => setSubmitted(true)}
                        className="flex-1 inline-flex items-center justify-center gap-2 bg-accent hover:bg-accent-soft text-ink-950 font-semibold rounded-lg px-4 py-2 transition">
                  <Sparkles className="w-4 h-4" /> Get recommendations
                </button>
                <button onClick={resetForm}
                        className="inline-flex items-center gap-2 bg-ink-800 hover:bg-ink-700 text-slate-300 rounded-lg px-3 py-2 text-sm transition"
                        title="Reset form">
                  <RefreshCw className="w-4 h-4" />
                </button>
              </div>

              <div className="mt-4 text-[11px] text-slate-500 leading-relaxed">
                Results update live as you tweak. Hitting the button just highlights the verdict banner.
              </div>
            </Card>

            {/* Results */}
            <div>
              {/* Verdict banner */}
              <Card className={cx('p-5 mb-5 border',
                results.verdict.tone === 'good' && 'border-emerald-500/30 bg-emerald-500/5',
                results.verdict.tone === 'meh'  && 'border-amber-500/30 bg-amber-500/5',
                results.verdict.tone === 'bad'  && 'border-rose-500/30 bg-rose-500/5')}>
                <div className="flex items-start gap-3">
                  <div className={cx('w-9 h-9 rounded-full flex items-center justify-center shrink-0',
                    results.verdict.tone === 'good' && 'bg-emerald-500/20 text-emerald-300',
                    results.verdict.tone === 'meh'  && 'bg-amber-500/20 text-amber-300',
                    results.verdict.tone === 'bad'  && 'bg-rose-500/20 text-rose-300')}>
                    {results.verdict.tone === 'good' ? <TrendingUp className="w-5 h-5" /> :
                     results.verdict.tone === 'meh'  ? <Info className="w-5 h-5" /> :
                                                       <RefreshCw className="w-5 h-5" />}
                  </div>
                  <div className="flex-1">
                    <div className="text-xs uppercase tracking-widest text-slate-400">Verdict</div>
                    <div className="text-lg font-semibold text-slate-100">{results.verdict.label}</div>
                    <div className="text-sm text-slate-300 mt-1">{results.verdict.text}</div>
                  </div>
                </div>
              </Card>

              {/* Recommendations */}
              <div className="space-y-4">
                {results.candidates.map(({ phone, score, eco, topPri }, idx) => (
                  <Card key={phone.id} className={cx('p-5 animate-slide-up', idx === 0 && 'ring-2 ring-accent/50')}>
                    <div className="flex items-start gap-4">
                      <div className="w-12 h-16 rounded-lg flex items-center justify-center shrink-0"
                           style={{ background: `${phone.accent}22`, border: `1px solid ${phone.accent}66` }}>
                        <Smartphone className="w-6 h-6" style={{ color: phone.accent }} />
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-start justify-between gap-2 flex-wrap">
                          <div>
                            <div className="flex items-center gap-2">
                              <div className="text-lg font-semibold text-slate-100">{phone.brand} {phone.model}</div>
                              {idx === 0 && <Pill tone="accent"><Award className="w-3 h-3" /> Top pick</Pill>}
                            </div>
                            <div className="text-xs text-slate-400 mt-0.5">S${phone.price} · {phone.tier} · {phone.ecosystem}</div>
                          </div>
                          <div className="text-right">
                            <div className="text-xs text-slate-400">Match score</div>
                            <div className="text-2xl font-bold text-slate-100 leading-none">{score.adjusted.toFixed(1)}</div>
                            {score.penalty > 0 && (
                              <div className="text-[10px] text-amber-300 mt-1">raw {score.raw.toFixed(1)} − {score.penalty} eco friction</div>
                            )}
                          </div>
                        </div>

                        <div className="mt-3">
                          <StatBar label="Match" value={score.adjusted} sub={`${score.adjusted.toFixed(1)}/100`} color={phone.accent} />
                        </div>

                        <div className="mt-3 text-sm text-slate-300">
                          Best fit for your <span className="text-accent-soft">{topPri.map(k => PRIORITY_LABELS[k].toLowerCase()).join(' & ')}</span> priorities.
                          {' '}Sentiment {phone.sentimentScore}%.
                        </div>

                        {(eco.lost.length > 0 || eco.gained.length > 0) && (
                          <div className="mt-3 grid sm:grid-cols-2 gap-3">
                            {eco.lost.length > 0 && (
                              <div className="text-xs">
                                <div className="text-rose-400/80 uppercase tracking-wider mb-1">You'd lose</div>
                                <div className="flex flex-wrap gap-1">
                                  {eco.lost.slice(0, 5).map(f => <Pill key={f} tone="bad">{f}</Pill>)}
                                </div>
                              </div>
                            )}
                            {eco.gained.length > 0 && (
                              <div className="text-xs">
                                <div className="text-emerald-400/80 uppercase tracking-wider mb-1">You'd gain</div>
                                <div className="flex flex-wrap gap-1">
                                  {eco.gained.slice(0, 5).map(f => <Pill key={f} tone="good">{f}</Pill>)}
                                </div>
                              </div>
                            )}
                          </div>
                        )}

                        {score.penalty >= 15 && (
                          <div className="mt-3 text-xs text-amber-200/90 bg-amber-500/10 border border-amber-500/20 rounded-lg p-2 flex gap-2">
                            <Info className="w-3.5 h-3.5 shrink-0 mt-0.5" />
                            <div>Cross-platform switch ({currentPhone.ecosystemFamily} → {phone.ecosystemFamily}). Expect a real learning curve and migration effort — messages, backups, and paid apps don't come with you.</div>
                          </div>
                        )}
                      </div>
                    </div>
                  </Card>
                ))}
                {results.candidates.length === 0 && (
                  <Card className="p-8 text-center text-slate-400">
                    No phones fit under S${budget}. Try raising your budget.
                  </Card>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    };

    /* ---------------- App shell ---------------- */
    const TABS = [
      { id: 'browse',  label: 'Browse',  icon: Layers },
      { id: 'compare', label: 'Compare', icon: Package },
      { id: 'advisor', label: 'Advisor', icon: Sparkles },
    ];

    const App = () => {
      const [tab, setTab] = useState('browse');
      const [shortlist, setShortlist] = useState(['iphone-17-pro-max', 'galaxy-s26-ultra']);

      const toggleShortlist = (id) => {
        setShortlist(prev => {
          if (prev.includes(id)) return prev.filter(x => x !== id);
          if (prev.length >= 3) return [...prev.slice(1), id];
          return [...prev, id];
        });
      };

      return (
        <div className="min-h-screen bg-ink-950">
          {/* Ambient gradient */}
          <div className="pointer-events-none fixed inset-0 overflow-hidden opacity-60">
            <div className="absolute -top-40 -left-40 w-[500px] h-[500px] rounded-full blur-3xl" style={{ background: 'radial-gradient(circle, rgba(124,92,255,0.25), transparent 70%)' }} />
            <div className="absolute top-1/3 -right-40 w-[500px] h-[500px] rounded-full blur-3xl" style={{ background: 'radial-gradient(circle, rgba(94,234,212,0.15), transparent 70%)' }} />
          </div>

          <header className="relative border-b border-ink-800 bg-ink-950/70 backdrop-blur-md sticky top-0 z-20">
            <div className="max-w-7xl mx-auto px-4 md:px-6 py-3 flex items-center gap-4">
              <div className="flex items-center gap-2">
                <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-accent to-teal-400 flex items-center justify-center">
                  <Zap className="w-4 h-4 text-ink-950" />
                </div>
                <div>
                  <div className="text-slate-100 font-semibold leading-tight">LazyComparo</div>
                  <div className="text-[10px] uppercase tracking-widest text-slate-500 leading-tight">Phone advisor</div>
                </div>
              </div>

              <nav className="ml-4 flex bg-ink-900 rounded-lg p-1 ring-1 ring-ink-800">
                {TABS.map(({ id, label, icon: I }) => (
                  <button key={id} onClick={() => setTab(id)}
                          className={cx('px-3 py-1.5 text-sm rounded-md inline-flex items-center gap-1.5 transition',
                            tab === id ? 'bg-ink-700 text-slate-100' : 'text-slate-400 hover:text-slate-200')}>
                    <I className="w-4 h-4" /> {label}
                    {id === 'compare' && shortlist.length > 0 && (
                      <span className="ml-1 text-[10px] bg-accent text-ink-950 rounded-full px-1.5 leading-4 font-semibold">{shortlist.length}</span>
                    )}
                  </button>
                ))}
              </nav>

              <div className="ml-auto hidden md:flex items-center gap-2 text-xs text-slate-500">
                <Star className="w-3.5 h-3.5" /> {PHONES.length} phones · updated for 2026
              </div>
            </div>
          </header>

          <main className="relative max-w-7xl mx-auto px-4 md:px-6 py-8">
            {tab === 'browse' &&
              <BrowseView shortlist={shortlist} onToggle={toggleShortlist} />}
            {tab === 'compare' &&
              <CompareView shortlist={shortlist} setShortlist={setShortlist} onGoBrowse={() => setTab('browse')} />}
            {tab === 'advisor' &&
              <AdvisorView />}
          </main>

          <footer className="relative border-t border-ink-800 mt-16">
            <div className="max-w-7xl mx-auto px-4 md:px-6 py-6 text-xs text-slate-500 flex flex-wrap items-center justify-between gap-2">
              <div>LazyComparo · we do the boring comparison work · mock data for demo — prices in S$ (Singapore market), illustrative.</div>
              <div className="flex items-center gap-3">
                <span>Algorithm: weighted priority × ecosystem penalty</span>
              </div>
            </div>
          </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <script>
    // Manual Babel transform so we can pin runtime: 'classic' (the automatic
    // runtime emits `import` statements that fail silently in a non-module script).
    (function () {
      var src = document.getElementById('app-source').textContent;
      try {
        var out = Babel.transform(src, {
          presets: [['react', { runtime: 'classic' }]]
        });
        (0, eval)(out.code);
      } catch (e) {
        console.error('App bootstrap failed:', e);
        document.getElementById('root').innerHTML =
          '<pre style="color:#f87171;padding:16px;white-space:pre-wrap;">' +
          String(e && e.stack || e) + '</pre>';
      }
    })();
  </script>
</body>
</html>
