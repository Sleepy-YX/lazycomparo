    /* ---------------- Scoring Algorithm ---------------- */
    /*
     * scoreGame(game, priorities)
     *   priorities = { combat, story, coop, replay } each 0-100.
     *   Returns a single weighted score 0-100 plus per-dimension contributions,
     *   so the Advisor can explain *why* a game ranked where it did.
     */
    function scoreGame(game, priorities) {
      const keys = ['combat', 'story', 'coop', 'replay'];
      const totalWeight = keys.reduce((s, k) => s + priorities[k], 0);
      if (totalWeight === 0) return { score: 0, contributions: {} };

      let score = 0;
      const contributions = {};
      keys.forEach((k) => {
        const c = (priorities[k] * game.specs[k]) / totalWeight;
        contributions[k] = c;
        score += c;
      });

      return { score: Math.round(score * 10) / 10, contributions };
    }

    function topPrioritiesForGame(contributions) {
      return Object.entries(contributions)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 2)
        .map(([k]) => k);
    }

        <ChevronDown className="w-4 h-4 text-slate-500 absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none" />
      </div>
    );

    /* ---------------- Game card (used in Browse + Compare picker) ---------------- */
    const GameCard = ({ game, selected, onClick, showPrice = true }) => (
      <Card className={cx('p-4 relative animate-fade-in', selected && 'ring-2 ring-accent')}
            onClick={onClick}>
        <div className="flex items-center gap-3">
          <div className="w-10 h-10 rounded-lg flex items-center justify-center shrink-0"
               style={{ background: `${game.accent}22`, border: `1px solid ${game.accent}66` }}>
            <Gamepad className="w-5 h-5" style={{ color: game.accent }} />
          </div>
          <div className="min-w-0 flex-1">
            <div className="text-xs text-slate-400">{game.studio}</div>
            <div className="text-slate-100 font-semibold truncate">{game.title}</div>
            <div className="flex items-center gap-2 mt-1">
              <Pill>{game.genre}</Pill>
              {showPrice && <span className="text-xs text-slate-400">S${game.price}</span>}
            </div>
          </div>
          {selected && (
            <div className="w-6 h-6 rounded-full bg-accent flex items-center justify-center shrink-0">
              <Check className="w-3.5 h-3.5 text-ink-950" />
            </div>
          )}
        </div>
        <div className="mt-3 space-y-1">
          <StatBar label="Steam rating" value={game.displayInfo.rating} sub={`${game.displayInfo.rating}%`} color={game.accent} />
        </div>
      </Card>
    );

    /* ---------------- Browse view ---------------- */
    const BrowseView = ({ shortlist, onToggle }) => {
      const [query, setQuery] = useState('');
      const [genre, setGenre] = useState('All');
      const [coop, setCoop] = useState('All');
      const [sort, setSort] = useState('rating');

      const genres = ['All', ...Array.from(new Set(GAMES.map(g => g.genre)))];

      const list = useMemo(() => {
        let out = GAMES.filter(g =>
          (genre === 'All' || g.genre === genre) &&
          (coop === 'All' || (coop === 'Co-op' ? g.maxPlayers > 1 : g.maxPlayers === 1)) &&
          (query.trim() === '' || (g.studio + ' ' + g.title).toLowerCase().includes(query.toLowerCase()))
        );
        if (sort === 'rating') out = out.sort((a,b)=>b.displayInfo.rating-a.displayInfo.rating);
        if (sort === 'price-asc') out = out.sort((a,b)=>a.price-b.price);
        if (sort === 'price-desc') out = out.sort((a,b)=>b.price-a.price);
        if (sort === 'year') out = out.sort((a,b)=>b.year-a.year);
        if (sort === 'value') out = out.sort((a,b)=>dollarsPerHour(a)-dollarsPerHour(b));
        return out;
      }, [query, genre, coop, sort]);

      return (
        <div className="animate-fade-in">
          <SectionTitle eyebrow="Catalog" icon={Layers}
            title="Browse games"
            subtitle={`${GAMES.length} Steam games across ${genres.length-1} genres, S$12 to S$70. Tap a card to add it to your comparison shortlist.`} />

          <Card className="p-3 mb-6">
            <div className="grid grid-cols-1 md:grid-cols-[1fr_auto_auto_auto] gap-2">
              <div className="relative">
                <Search className="w-4 h-4 text-slate-500 absolute left-3 top-1/2 -translate-y-1/2" />
                <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search studio or title..."
                  className="w-full bg-ink-900 ring-1 ring-ink-700 focus:ring-accent focus:outline-none rounded-lg pl-9 pr-3 py-2 text-sm text-slate-100 placeholder:text-slate-500" />
              </div>
              <Selector value={genre} onChange={setGenre} options={genres} label="Genre" />
              <Selector value={coop} onChange={setCoop} options={['All','Co-op','Singleplayer']} label="Mode" />
              <Selector value={sort} onChange={setSort}
                options={['rating','price-asc','price-desc','year','value']}
                labels={{rating:'Top rated', 'price-asc':'Price ↑','price-desc':'Price ↓', year:'Newest', value:'Best $/hour'}}
                label="Sort" />
            </div>
          </Card>

          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
            {list.map(g => (
              <GameCard key={g.id} game={g} selected={shortlist.includes(g.id)} onClick={() => onToggle(g.id)} />
            ))}
            {list.length === 0 && (
              <div className="col-span-full text-center text-slate-500 py-12">No games match your filters.</div>
            )}
          </div>
        </div>
      );
    };

    /* ---------------- Compare view ---------------- */
    const CompareView = ({ shortlist, setShortlist, onGoBrowse }) => {
      const picked = shortlist.map(id => GAMES.find(g => g.id === id)).filter(Boolean);
      const canAddMore = picked.length < 3;

      if (picked.length < 2) {
        return (
          <div className="animate-fade-in">
            <SectionTitle eyebrow="Compare" icon={Layers}
              title="Side-by-side game matrix"
              subtitle="Pick 2 or 3 games from the catalog to compare price, rating, hours-to-beat, and co-op support." />
            <Card className="p-8 text-center">
              <div className="text-slate-400 mb-4">You have {picked.length} game{picked.length === 1 ? '' : 's'} selected. Add {2 - picked.length} more to start comparing.</div>
              <button onClick={onGoBrowse}
                className="inline-flex items-center gap-2 bg-accent hover:bg-accent-soft text-ink-950 font-semibold rounded-lg px-4 py-2 transition">
                Browse games <ArrowRight className="w-4 h-4" />
              </button>
            </Card>
          </div>
        );
      }

      const specRows = [
        { key: 'rating', label: 'Steam rating', get: (g) => `${g.displayInfo.rating}%`, cmp: (a,b) => a.displayInfo.rating - b.displayInfo.rating, icon: Star },
        { key: 'price', label: 'Price', get: (g) => `S$${g.price}`, cmp: (a,b) => b.price - a.price, icon: DollarSign }, // lower price wins
        { key: 'value', label: '$ / hour', get: (g) => `S$${dollarsPerHour(g)}`, cmp: (a,b) => dollarsPerHour(b) - dollarsPerHour(a), icon: TrendingUp }, // lower wins
        { key: 'hours', label: 'Hours to beat', get: (g) => `${g.displayInfo.hoursToBeat}h`, cmp: (a,b) => a.displayInfo.hoursToBeat - b.displayInfo.hoursToBeat, icon: Clock },
        { key: 'year', label: 'Released', get: (g) => g.year, cmp: (a,b) => a.year - b.year },
        { key: 'combat', label: 'Combat depth', get: (g) => g.specs.combat, cmp: (a,b) => a.specs.combat - b.specs.combat, icon: Skull },
        { key: 'story', label: 'Story depth', get: (g) => g.specs.story, cmp: (a,b) => a.specs.story - b.specs.story, icon: BookOpen },
        { key: 'replay', label: 'Replayability', get: (g) => g.specs.replay, cmp: (a,b) => a.specs.replay - b.specs.replay, icon: Repeat },
        { key: 'players', label: 'Players', get: (g) => g.displayInfo.players, icon: Users },
        { key: 'earlyAccess', label: 'Early Access', get: (g) => g.displayInfo.earlyAccess ? 'Yes' : 'No, 1.0 release' },
      ];

      return (
        <div className="animate-fade-in">
          <SectionTitle eyebrow="Compare" icon={Layers}
            title="Side-by-side comparison"
            subtitle="Green rows highlight the winner on each dimension." />

          {/* Game chips row */}
          <div className={cx('grid gap-3 mb-6', picked.length === 2 ? 'md:grid-cols-2' : 'md:grid-cols-3')}>
            {picked.map(g => (
              <Card key={g.id} className="p-4 relative">
                <button onClick={() => setShortlist(shortlist.filter(id => id !== g.id))}
                        className="absolute top-3 right-3 text-slate-500 hover:text-rose-400" title="Remove">
                  <X className="w-4 h-4" />
                </button>
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg flex items-center justify-center shrink-0"
                       style={{ background: `${g.accent}22`, border: `1px solid ${g.accent}66` }}>
                    <Gamepad className="w-5 h-5" style={{ color: g.accent }} />
                  </div>
                  <div>
                    <div className="text-xs text-slate-400">{g.studio}</div>
                    <div className="text-slate-100 font-semibold">{g.title}</div>
                    <div className="text-xs text-slate-400">S${g.price} · {g.year}</div>
                  </div>
                </div>
                <div className="mt-3 space-y-1.5">
                  <StatBar label="Combat" value={g.specs.combat} color={g.accent} sub={g.specs.combat} />
                  <StatBar label="Story" value={g.specs.story} color={g.accent} sub={g.specs.story} />
                  <StatBar label="Co-op" value={g.specs.coop} color={g.accent} sub={g.specs.coop} />
                  <StatBar label="Replay" value={g.specs.replay} color={g.accent} sub={g.specs.replay} />
                </div>
              </Card>
            ))}
            {canAddMore && (
              <Card className="p-4 border-2 border-dashed border-ink-700 flex items-center justify-center text-slate-500 hover:text-accent-soft hover:border-accent/50 cursor-pointer"
                    onClick={onGoBrowse}>
                <div className="text-center">
                  <Plus className="w-6 h-6 mx-auto mb-1" />
                  <div className="text-sm">Add another game</div>
                </div>
              </Card>
            )}
          </div>

          {/* Spec matrix */}
          <Card className="overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead className="bg-ink-800/60 text-slate-400 text-xs uppercase tracking-wider">
                  <tr>
                    <th className="text-left px-4 py-3 font-medium">Spec</th>
                    {picked.map(g => (
                      <th key={g.id} className="text-left px-4 py-3 font-medium text-slate-200">{g.title}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {specRows.map((row, i) => {
                    let winnerId = null;
                    if (row.cmp) {
                      const sorted = [...picked].sort(row.cmp);
                      winnerId = sorted[sorted.length - 1].id;
                    }
                    const I = row.icon;
                    return (
                      <tr key={row.key} className={cx(i % 2 === 0 ? 'bg-ink-850' : 'bg-ink-900/60')}>
                        <td className="px-4 py-3 text-slate-400 whitespace-nowrap">
                          <span className="inline-flex items-center gap-2">
                            {I && <I className="w-4 h-4 text-slate-500" />}
                            {row.label}
                          </span>
                        </td>
                        {picked.map(g => (
                          <td key={g.id}
                              className={cx('px-4 py-3', winnerId === g.id && 'text-emerald-300 font-medium')}>
                            <span className="inline-flex items-center gap-2">
                              {row.get(g)}
                              {winnerId === g.id && <Award className="w-3.5 h-3.5" />}
                            </span>
                          </td>
                        ))}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </Card>

          {/* Pros/cons columns */}
          <div className={cx('grid gap-3 mt-6', picked.length === 2 ? 'md:grid-cols-2' : 'md:grid-cols-3')}>
            {picked.map(g => (
              <Card key={g.id} className="p-4">
                <div className="text-slate-200 font-semibold mb-3">{g.title}</div>
                <div className="mb-3">
                  <div className="text-xs uppercase tracking-wider text-emerald-400/80 mb-2 flex items-center gap-1"><Check className="w-3 h-3" /> Pros</div>
                  <ul className="space-y-1.5">
                    {g.pros.map((s, i) => <li key={i} className="text-sm text-slate-300 flex gap-2"><span className="text-emerald-400 mt-0.5">+</span>{s}</li>)}
                  </ul>
                </div>
                <div>
                  <div className="text-xs uppercase tracking-wider text-rose-400/80 mb-2 flex items-center gap-1"><X className="w-3 h-3" /> Cons</div>
                  <ul className="space-y-1.5">
                    {g.cons.map((s, i) => <li key={i} className="text-sm text-slate-300 flex gap-2"><span className="text-rose-400 mt-0.5">−</span>{s}</li>)}
                  </ul>
                </div>
              </Card>
            ))}
          </div>
        </div>
      );
    };

    /* ---------------- Advisor view ---------------- */
    const PRIORITY_LABELS = { combat: 'Combat depth', story: 'Story / writing', coop: 'Co-op support', replay: 'Replayability' };
    const PRIORITY_ICONS = { combat: Skull, story: BookOpen, coop: Users, replay: Repeat };
    const DEFAULT_PRIORITIES = { combat: 60, story: 60, coop: 60, replay: 60 };

    const AdvisorView = () => {
      const [priorities, setPriorities] = useState(DEFAULT_PRIORITIES);
      const [budget, setBudget] = useState(50);

      const results = useMemo(() => {
        const candidates = GAMES
          .filter(g => g.price <= budget)
          .map(g => {
            const { score, contributions } = scoreGame(g, priorities);
            return { game: g, score, contributions, top: topPrioritiesForGame(contributions) };
          })
          .sort((a, b) => b.score - a.score);
        return { candidates };
      }, [priorities, budget]);

      return (
        <div className="animate-fade-in">
          <SectionTitle eyebrow="Advisor" icon={Sparkles}
            title="What should I buy on sale?"
            subtitle="Set your budget and how much you care about each dimension — the advisor weighs every game in the catalog and ranks what fits." />

          <div className="grid grid-cols-1 lg:grid-cols-[320px_1fr] gap-6">
            <Card className="p-5 h-fit">
              <div className="text-sm text-slate-300 font-medium mb-4">Your priorities</div>
              <div className="space-y-5">
                {Object.keys(priorities).map((k) => {
                  const I = PRIORITY_ICONS[k];
                  return (
                    <div key={k}>
                      <div className="flex items-center justify-between text-xs mb-1.5">
                        <span className="text-slate-300 inline-flex items-center gap-1.5"><I className="w-3.5 h-3.5 text-accent-soft" /> {PRIORITY_LABELS[k]}</span>
                        <span className="text-slate-400">{priorities[k]}</span>
                      </div>
                      <input type="range" min="0" max="100" value={priorities[k]}
                        onChange={e => setPriorities(p => ({ ...p, [k]: Number(e.target.value) }))}
                        className="w-full" />
                    </div>
                  );
                })}
              </div>

              <div className="mt-6 pt-5 border-t border-ink-700">
                <div className="flex items-center justify-between text-xs mb-1.5">
                  <span className="text-slate-300 inline-flex items-center gap-1.5"><DollarSign className="w-3.5 h-3.5 text-accent-soft" /> Budget</span>
                  <span className="text-slate-400">S${budget}</span>
                </div>
                <input type="range" min="10" max="70" step="5" value={budget}
                  onChange={e => setBudget(Number(e.target.value))} className="w-full" />
              </div>
            </Card>

            <div className="space-y-3">
              {results.candidates.slice(0, 6).map(({ game: g, score, top }, i) => (
                <Card key={g.id} className={cx('p-4', i === 0 && 'ring-2 ring-accent')}>
                  <div className="flex items-center gap-3">
                    <div className="w-9 h-9 rounded-lg flex items-center justify-center shrink-0"
                         style={{ background: `${g.accent}22`, border: `1px solid ${g.accent}66` }}>
                      <Gamepad className="w-4 h-4" style={{ color: g.accent }} />
                    </div>
                    <div className="min-w-0 flex-1">
                      <div className="flex items-center gap-2">
                        <span className="text-slate-100 font-semibold">{g.title}</span>
                        {i === 0 && <Pill tone="accent">Top pick</Pill>}
                      </div>
                      <div className="text-xs text-slate-400 mt-0.5">{g.genre} · S${g.price} · {g.displayInfo.hoursToBeat}h to beat</div>
                    </div>
                    <div className="text-right shrink-0">
                      <div className="text-lg font-bold text-slate-100">{score.toFixed(1)}</div>
                      <div className="text-[10px] uppercase tracking-wider text-slate-500">match score</div>
                    </div>
                  </div>
                  <div className="mt-2 text-xs text-slate-500">
                    Strongest on: {top.map(k => PRIORITY_LABELS[k]).join(', ')}
                  </div>
                </Card>
              ))}
              {results.candidates.length === 0 && (
                <Card className="p-8 text-center text-slate-400">
                  No games fit under S${budget}. Try raising your budget.
                </Card>
              )}
            </div>
          </div>
        </div>
      );
    };

    /* ---------------- Value view ---------------- */
    const ValueView = () => {
      const [genre, setGenre] = useState('All');
      const genres = ['All', ...Array.from(new Set(GAMES.map(g => g.genre)))];

      const rows = useMemo(() => {
        return GAMES
          .filter(g => genre === 'All' || g.genre === genre)
          .map(g => ({ game: g, perHour: dollarsPerHour(g) }))
          .sort((a, b) => a.perHour - b.perHour);
      }, [genre]);

      const maxPerHour = Math.max(...rows.map(r => r.perHour), 0.1);

      return (
        <div className="animate-fade-in">
          <SectionTitle eyebrow="Best value" icon={TrendingUp}
            title="Which games give you the most hours per dollar?"
            subtitle="Price ÷ hours-to-beat, sorted cheapest per hour first. Great for deciding what to grab in a Steam sale when budget is tight." />

          <Card className="p-5 mb-6">
            <div className="text-sm text-slate-300 mb-4 font-medium">S$ per hour of playtime (lower = better value)</div>
            <div className="space-y-3">
              {rows.map(({ game: g, perHour }) => (
                <div key={g.id}>
                  <div className="flex items-baseline justify-between text-xs mb-1">
                    <span className="text-slate-300 font-medium">{g.title}</span>
                    <span className="text-slate-400">S${perHour}/hr</span>
                  </div>
                  <div className="h-2.5 rounded-full bg-ink-800 overflow-hidden">
                    <div className="h-full rounded-full transition-all duration-500"
                         style={{ width: `${(perHour / maxPerHour) * 100}%`, background: `linear-gradient(90deg, ${g.accent}80, ${g.accent})` }} />
                  </div>
                </div>
              ))}
            </div>
            <div className="mt-4 text-xs text-slate-500 flex items-start gap-2">
              <Info className="w-3.5 h-3.5 shrink-0 mt-0.5" />
              <div>"Hours to beat" is main-content playtime, not 100%-completion — sandbox/live-service games (Terraria, Deep Rock Galactic) will keep paying off well past this number.</div>
            </div>
          </Card>

          <Card className="p-3 mb-6">
            <Selector value={genre} onChange={setGenre} options={genres} label="Genre" />
          </Card>

          <Card className="overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead className="bg-ink-800/60 text-slate-400 text-xs uppercase tracking-wider">
                  <tr>
                    <th className="text-left px-4 py-3 font-medium">Game</th>
                    <th className="text-left px-4 py-3 font-medium">Price</th>
                    <th className="text-left px-4 py-3 font-medium">Hours to beat</th>
                    <th className="text-left px-4 py-3 font-medium">$ / hour</th>
                    <th className="text-left px-4 py-3 font-medium">Rating</th>
                  </tr>
                </thead>
                <tbody>
                  {rows.map(({ game: g, perHour }, i) => (
                    <tr key={g.id} className={cx(i % 2 === 0 ? 'bg-ink-850' : 'bg-ink-900/60')}>
                      <td className="px-4 py-3 text-slate-200 whitespace-nowrap">{g.title} <span className="text-slate-500">· {g.year}</span></td>
                      <td className="px-4 py-3 text-slate-400">S${g.price}</td>
                      <td className="px-4 py-3 text-slate-200">{g.displayInfo.hoursToBeat}h</td>
                      <td className="px-4 py-3">
                        <span className={cx(perHour <= 0.5 ? 'text-emerald-300' : perHour <= 1.5 ? 'text-amber-300' : 'text-rose-300')}>S${perHour}</span>
                      </td>
                      <td className="px-4 py-3 text-slate-300">{g.displayInfo.rating}%</td>
                    </tr>
                  ))}
                  {rows.length === 0 && (
                    <tr><td colSpan="5" className="px-4 py-8 text-center text-slate-500">No games match this filter.</td></tr>
                  )}
                </tbody>
              </table>
            </div>
          </Card>
        </div>
      );
    };

    /* ---------------- App shell ---------------- */
    const TABS = [
      { id: 'browse',  label: 'Browse',  icon: Layers },
      { id: 'compare', label: 'Compare', icon: Package },
      { id: 'advisor', label: 'Advisor', icon: Sparkles },
      { id: 'value',   label: 'Best Value', icon: TrendingUp },
    ];

    const App = () => {
      const [tab, setTab] = useState('browse');
      const [shortlist, setShortlist] = useState(['valheim', 'icarus', 'remnant2']);

      const toggleShortlist = (id) => {
        setShortlist(prev => {
          if (prev.includes(id)) return prev.filter(x => x !== id);
          if (prev.length >= 3) return [...prev.slice(1), id];
          return [...prev, id];
        });
      };

      return (
        <div className="min-h-screen bg-ink-950">
          {/* Ambient gradient */}
          <div className="pointer-events-none fixed inset-0 overflow-hidden opacity-60">
            <div className="absolute -top-40 -left-40 w-[500px] h-[500px] rounded-full blur-3xl" style={{ background: 'radial-gradient(circle, rgba(34,211,238,0.25), transparent 70%)' }} />
            <div className="absolute top-1/3 -right-40 w-[500px] h-[500px] rounded-full blur-3xl" style={{ background: 'radial-gradient(circle, rgba(167,139,250,0.15), transparent 70%)' }} />
          </div>

          <header className="relative border-b border-ink-800 bg-ink-950/70 backdrop-blur-md sticky top-0 z-20">
            <div className="max-w-7xl mx-auto px-4 md:px-6 py-3 flex items-center gap-4">
              <div className="flex items-center gap-2">
                <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-accent to-violet-400 flex items-center justify-center">
                  <Zap className="w-4 h-4 text-ink-950" />
                </div>
                <div>
                  <div className="text-slate-100 font-semibold leading-tight">PcGames.LazyComparo</div>
                  <div className="text-[10px] uppercase tracking-widest text-slate-500 leading-tight">Steam game advisor</div>
                </div>
              </div>

              <nav className="ml-4 flex bg-ink-900 rounded-lg p-1 ring-1 ring-ink-800">
                {TABS.map(({ id, label, icon: I }) => (
                  <button key={id} onClick={() => setTab(id)}
                          className={cx('px-3 py-1.5 text-sm rounded-md inline-flex items-center gap-1.5 transition',
                            tab === id ? 'bg-ink-700 text-slate-100' : 'text-slate-400 hover:text-slate-200')}>
                    <I className="w-4 h-4" /> {label}
                    {id === 'compare' && shortlist.length > 0 && (
                      <span className="ml-1 text-[10px] bg-accent text-ink-950 rounded-full px-1.5 leading-4 font-semibold">{shortlist.length}</span>
                    )}
                  </button>
                ))}
              </nav>

              <div className="ml-auto hidden md:flex items-center gap-2 text-xs text-slate-500">
                <Star className="w-3.5 h-3.5" /> {GAMES.length} games · updated for 2026
              </div>
            </div>
          </header>

          <main className="relative max-w-7xl mx-auto px-4 md:px-6 py-8">
            {tab === 'browse' &&
              <BrowseView shortlist={shortlist} onToggle={toggleShortlist} />}
            {tab === 'compare' &&
              <CompareView shortlist={shortlist} setShortlist={setShortlist} onGoBrowse={() => setTab('browse')} />}
            {tab === 'advisor' &&
              <AdvisorView />}
            {tab === 'value' &&
              <ValueView />}
          </main>

          <footer className="relative border-t border-ink-800 mt-16">
            <div className="max-w-7xl mx-auto px-4 md:px-6 py-6 text-xs text-slate-500 flex flex-wrap items-center justify-between gap-2">
              <div>PcGames.LazyComparo · we do the boring comparison work · illustrative data for demo — prices in S$ (Singapore Steam store), non-sale.</div>
              <div className="flex items-center gap-3">
                <span>Algorithm: weighted priority score · $/hour value ranking</span>
              </div>
            </div>
          </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <script>
    // Manual Babel transform so we can pin runtime: 'classic' (the automatic
    // runtime emits `import` statements that fail silently in a non-module script).
    (function () {
      var src = document.getElementById('app-source').textContent;
      try {
        var out = Babel.transform(src, {
          presets: [['react', { runtime: 'classic' }]]
        });
        (0, eval)(out.code);
      } catch (e) {
        console.error('App bootstrap failed:', e);
        document.getElementById('root').innerHTML =
          '<pre style="color:#f87171;padding:16px;white-space:pre-wrap;">' +
          String(e && e.stack || e) + '</pre>';
      }
    })();
  </script>
</body>
</html>
