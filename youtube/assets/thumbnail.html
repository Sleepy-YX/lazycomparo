<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thumbnail — screenshot the 1280x720 frame</title>
<style>
  body { margin: 0; background: #334155; display: grid; place-items: center; min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif; }
  .thumb { width: 1280px; height: 720px; position: relative; overflow: hidden;
    background: #0b1120; display: flex; }
  .half { flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 10px; position: relative; }
  .half.apple { background: linear-gradient(160deg, #0b1120 30%, #1e3a8a); }
  .half.samsung { background: linear-gradient(200deg, #0b1120 30%, #134e4a); }
  .divider { position: absolute; left: 50%; top: 0; bottom: 0; width: 6px;
    background: #f43f5e; transform: translateX(-50%) rotate(4deg) scaleY(1.2); z-index: 2; }
  .model { color: #cbd5e1; font-size: 44px; font-weight: 700; }
  .price { font-size: 130px; font-weight: 900; letter-spacing: -3px; }
  .apple .price { color: #8ecfff; }
  .samsung .price { color: #5eead4; }
  .strike { color: #64748b; font-size: 40px; text-decoration: line-through; text-decoration-color: #f43f5e; text-decoration-thickness: 5px; }
  .banner { position: absolute; left: 50%; bottom: 48px; transform: translateX(-50%) rotate(-2deg);
    background: #f43f5e; color: #fff; font-size: 58px; font-weight: 900; padding: 14px 44px;
    border-radius: 14px; white-space: nowrap; z-index: 3; box-shadow: 0 12px 40px #000c; }
  .brand { position: absolute; top: 28px; left: 50%; transform: translateX(-50%);
    color: #94a3b8; font-size: 26px; font-weight: 700; letter-spacing: .3em; z-index: 3;
    text-transform: uppercase; }
</style>
</head>
<body>
  <div class="thumb">
    <div class="brand">LazyComparo · SG</div>
    <div class="half apple">
      <div class="model">iPhone 17</div>
      <div class="strike">S$1,299</div>
      <div class="price">S$519</div>
    </div>
    <div class="divider"></div>
    <div class="half samsung">
      <div class="model">Galaxy S26</div>
      <div class="strike">S$1,438</div>
      <div class="price">S$838</div>
    </div>
    <div class="banner">the REAL price in Singapore</div>
  </div>
</body>
</html>
